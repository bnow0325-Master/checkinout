name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - claude/create-checkinout-repo-o0hrnh

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: file:./ci.db
      OFFICE_LATITUDE: "37.5636"
      OFFICE_LONGITUDE: "126.9868"
      OFFICE_RADIUS_METERS: "150"
      QR_TOTP_SECRET: ci-only-not-for-production
      QR_STEP_SECONDS: "30"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
